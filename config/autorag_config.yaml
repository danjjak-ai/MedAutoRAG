node_lines:
- node_line_name: retrieve_node_line
  nodes:
    - node_type: retrieval
      strategy:
        metrics: [retrieval_f1, retrieval_recall, retrieval_precision]
      modules:
        - module_type: bm25
        - module_type: vectordb
          embedding_model: huggingface_all_mini_lm_l6_v2  # Local-friendly
        - module_type: hybrid_cc
          semantic_weight: 0.5
          top_k: 5  # Limits memory usage

- node_line_name: generate_node_line
  nodes:
    - node_type: generator
      strategy:
        metrics: [bleu, rouge_l, meteor]
      modules:
        - module_type: llama_index_llm
          llm: ollama
          model: llama3.2
          temperature: 0.1
          batch: 1
